<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של אפרים רוטמן ז"ל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #fcfbf7;
            color: #333;
            scroll-behavior: smooth;
        }
        .memorial-title {
            font-family: 'Amatic SC', cursive;
            font-size: 5.5rem;
            line-height: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        /* עיצוב המסגרת העגולה - התאמה מושלמת ללא מתיחה */
        .profile-image-container {
            width: 260px; /* הגדלתי מעט את העיגול שיהיה ברור יותר */
            height: 260px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 4px solid white;
            background: #ffffff; /* רקע לבן נקי מאחורי התמונה */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-image-container img {
            /* object-fit: contain מבטיח שכל התמונה תיכנס לעיגול בלי להימתח ובלי להיגזר */
            width: 95%; /* משאיר מרווח לבן קטן ואסתטי מהקצוות */
            height: 95%;
            object-fit: contain;
            /* ביטול כל סוג של זום או הגדלה */
            transform: scale(1); 
        }
        /* אנימציית נר */
        .flame {
            width: 14px; height: 22px;
            background: linear-gradient(to bottom, #fff 0%, #ffeb3b 20%, #ff9800 50%, #f44336 80%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ff9800;
            animation: flicker 1.2s infinite alternate;
        }
        .candle-body { width: 28px; height: 45px; background: #f3f3f3; border-radius: 3px; box-shadow: inset 0 -4px 8px rgba(0,0,0,0.05); }
        
        @keyframes flicker {
            0% { transform: scale(1) rotate(-1deg); opacity: 0.8; }
            100% { transform: scale(1.1) rotate(1deg); opacity: 1; }
        }
        .fade-in { animation: fadeIn 1.8s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="relative h-[90vh] flex items-center justify-center text-center text-white bg-stone-900 overflow-hidden">
        <!-- תמונת רקע של יער - כפי שמופיע באתר שלך -->
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=2071" 
             class="absolute inset-0 w-full h-full object-cover opacity-40" alt="רקע">
        <div class="absolute inset-0 bg-black/10 z-0"></div>
        
        <div class="relative z-10 px-4 fade-in">
            <div class="profile-image-container">
                <!-- שימוש בתמונה המקורית שצירפת בשם הנכון -->
                <img src="IMG_3910_Original.jpg" alt="אפרים רוטמן ז"ל" onerror="this.src='https://via.placeholder.com/260?text=%D7%AA%D7%9E%D7%95%D7%A0%D7%94'">
            </div>

            <h1 class="memorial-title mb-2">אפרים רוטמן ז"ל</h1>
            <p class="text-2xl font-light opacity-90 mb-8 tracking-wider">2019 – 1935</p>
            
            <div class="flex flex-col items-center">
                <div class="flame mb-1"></div>
                <div class="candle-body"></div>
                <p class="mt-6 text-sm tracking-[0.4em] opacity-50 font-light uppercase">נזכור לעולם</p>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-24 text-center">
        <div class="bg-white p-12 md:p-20 rounded-[3rem] shadow-sm border border-stone-100">
            <h2 class="text-4xl font-bold mb-10 text-stone-800">לזכרו</h2>
            <div class="space-y-6 text-xl leading-relaxed text-stone-600 font-light italic">
                <p>"איש של משפחה, של ספר ושל עשייה."</p>
                <p>"חיוכו המאיר וטוב ליבו ימשיכו ללוות אותנו בכל צעד ובכל פינה בלב."</p>
            </div>
            <div class="mt-12 w-20 h-0.5 bg-stone-200 mx-auto"></div>
        </div>
    </main>

    <footer class="py-12 text-center text-stone-400 text-sm font-light">
        <p>ת.נ.צ.ב.ה</p>
    </footer>

</body>
</html>
